name: My CI/CD Pipeline

on:
  push:
     branches:
       - main

jobs:
  run-first-job:
    runs-on: ubuntu-latest

    steps:
         - name: Step 1 - Say Hello
           run: echo "Pipeline Started"

         - name: Step 2 - Show files
           run: ls

         - name: Step 3 - Print working directory
           run:  pwd
           
         - name: Step 4 - Show date
           run: date
name: My CI/CD Pipeline

on:
  push:
     branches:
       - main

jobs:
  run-first-job:
    runs-on: ubuntu-latest

    steps:
         - name: Step 1 - Start message
           run: echo "Starting Pipeline"

         - name: Step 2 - Show files in repo
           run: ls -la

         - name: Step 3 - Show working directory
           run:  pwd

         - name: Step 4 - Show system info
           run: uname -a

         - name: Step 5 - Show current date  
           run: date

         - name: Step 6 - Run fake test
           run: echo "all tests passed"

         - name: Step 7 - Check Nods version
           run: node -v

         - name: Step 8 - Custom message
           run: echo "This pipeline was built by Damilola"